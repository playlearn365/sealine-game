<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SeaLion Catch Game</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #1a1a2e;
        height: 100%;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      #canvas {
        display: block;
        background: black;
      }
      #status {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: white;
        font-family: Arial, sans-serif;
        font-size: 18px;
        text-align: center;
        z-index: 10;
      }
      #progress-bar-container {
        width: 300px;
        height: 20px;
        background: #333;
        border-radius: 10px;
        margin: 10px auto 0;
        overflow: hidden;
      }
      #progress-bar {
        height: 100%;
        background: #4fc3f7;
        border-radius: 10px;
        width: 0%;
        transition: width 0.2s;
      }
    </style>
    <link rel="icon" type="image/png" href="index.icon.png">
    <link rel="apple-touch-icon" href="index.apple-touch-icon.png">
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <div id="status">
      <div id="status-text">載入中...</div>
      <div id="progress-bar-container">
        <div id="progress-bar"></div>
      </div>
    </div>

    <script src="index.js"></script>
    <script>
      const statusEl = document.getElementById('status');
      const statusText = document.getElementById('status-text');
      const progressBar = document.getElementById('progress-bar');
      const canvas = document.getElementById('canvas');

      // 檢查 WebGL2 是否可用
      const missing = Engine.getMissingFeatures({ threads: false });
      if (missing.length > 0) {
        statusText.innerHTML = '您的瀏覽器不支援此遊戲：<br>' + missing.join('<br>');
        throw new Error('Missing features: ' + missing.join(', '));
      }

      const engine = new Engine({
        executable: 'index',
        mainPack: 'index.pck',
        canvas: canvas,
        canvasResizePolicy: 2,
        focusCanvas: true,
        unloadAfterInit: true,
        onProgress: function(current, total) {
          if (total > 0) {
            const pct = Math.round(current / total * 100);
            progressBar.style.width = pct + '%';
            statusText.textContent = '載入中... ' + pct + '%';
          } else {
            statusText.textContent = '載入中...';
          }
        },
        onPrintError: function() {
          console.error.apply(console, Array.from(arguments));
        },
      });

      engine.startGame().then(function() {
        statusEl.style.display = 'none';
        canvas.style.display = 'block';
      }).catch(function(err) {
        statusText.textContent = '遊戲載入失敗：' + err.message;
        console.error('Engine start error:', err);
      });
    </script>
  </body>
</html>
